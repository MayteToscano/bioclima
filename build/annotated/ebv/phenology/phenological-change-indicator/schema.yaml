$schema: https://json-schema.org/draft/2020-12/schema
description: Semantic CoverageJSON profile for a Phenological Change Indicator coverage.
type: object
required:
- type
- domain
- parameters
- parameterGroups
- ranges
properties:
  type:
    type: string
    const: Coverage
  domain:
    type: object
  parameters:
    type: object
    required:
    - trend
    - anomaly
    - changepoint_year
    - changepoint_pvalue
    properties:
      trend:
        $ref: '#/$defs/semanticParameter'
      anomaly:
        $ref: '#/$defs/semanticParameter'
      changepoint_year:
        $ref: '#/$defs/semanticParameter'
      changepoint_pvalue:
        $ref: '#/$defs/semanticParameter'
  parameterGroups:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - type
      - observedProperty
      - members
      properties:
        type:
          const: ParameterGroup
        observedProperty:
          type: object
          required:
          - id
          x-jsonld-id: https://covjson.org/def/core#observedProperty
        members:
          type: array
          contains:
            const: trend
          x-jsonld-id: https://covjson.org/def/core#members
    x-jsonld-id: https://covjson.org/def/core#parameterGroups
  ranges:
    type: object
    required:
    - trend
    - anomaly
    - changepoint_year
    - changepoint_pvalue
    properties:
      trend:
        $ref: '#/$defs/ndarray'
      anomaly:
        $ref: '#/$defs/ndarray'
      changepoint_year:
        $ref: '#/$defs/ndarray'
      changepoint_pvalue:
        $ref: '#/$defs/ndarray'
$defs:
  semanticParameter:
    type: object
    required:
    - type
    - observedProperty
    properties:
      type:
        const: Parameter
      observedProperty:
        type: object
        required:
        - id
        - label
        x-jsonld-id: https://covjson.org/def/core#observedProperty
      unit:
        type: object
  ndarray:
    type: object
    required:
    - type
    - dataType
    - axisNames
    - shape
    - values
    properties:
      type:
        const: NdArray
      dataType:
        type: string
      axisNames:
        type: array
      shape:
        type: array
      values:
        type: array
x-jsonld-prefixes:
  covjson: https://covjson.org/def/core#
  ebv: https://maytetoscano.github.io/bblock-ebv-bioclima/vocab/#
  prov: http://www.w3.org/ns/prov#
  dct: http://purl.org/dc/terms/
