name: Build and deploy BioClima site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ontology index
        run: |
          if [ -f scripts/build_ontology_index.py ]; then
            python3 scripts/build_ontology_index.py
          else
            echo "scripts/build_ontology_index.py not found; skipping"
          fi

      - name: Build multitemporal VAP CoverageJSON
        run: |
          if [ -f scripts/build_multitemporal_vap_covjson.py ] && [ -f viewer/data/summary.json ]; then
            python3 scripts/build_multitemporal_vap_covjson.py
          else
            echo "Temporal builder inputs not found or already generated; skipping"
          fi

      - name: Run bblocks postprocess
        run: |
          docker run --pull=always --rm --workdir /workspace \
            -v "$PWD:/workspace" \
            ghcr.io/opengeospatial/bblocks-postprocess \
            --register-file build/register.json \
            --items-dir _sources \
            --generated-docs-path build/generateddocs \
            --base-url "https://maytetoscano.github.io/bioclima/" \
            --fail-on-error true \
            --annotated-path build/annotated \
            --clean true \
            --config-file bblocks-config.yaml \
            --test-outputs build/tests \
            --github-base-url "https://github.com/MayteToscano/bioclima/blob/main/"

      - name: Copy custom viewer and data into generated site
        run: |
          mkdir -p build/generateddocs/viewer
          mkdir -p build/generateddocs/data

          rm -rf build/generateddocs/viewer/*
          rm -rf build/generateddocs/data/*

          cp -R viewer/* build/generateddocs/viewer/
          cp -R data/* build/generateddocs/data/

          echo "Checking published files:"
          test -f build/generateddocs/viewer/index.html
          test -f build/generateddocs/viewer/app.js
          test -f build/generateddocs/viewer/style.css
          test -f build/generateddocs/viewer/ontology.html
          test -f build/generateddocs/data/catalog.json
          test -f build/generateddocs/data/ontology-index.json

          echo "Checking temporal CoverageJSON files:"
          test -f build/generateddocs/data/observations/finland-vap-coniferous-2001-2018.covjson
          test -f build/generateddocs/data/observations/finland-vap-deciduous-2001-2018.covjson

          echo "Checking that viewer contains time/play and ontology-link code:"
          grep -q "playButton" build/generateddocs/viewer/app.js
          grep -q "timeControls" build/generateddocs/viewer/app.js
          grep -q "semanticInfoForParameter" build/generateddocs/viewer/app.js
          grep -q "localOntologyHref" build/generateddocs/viewer/app.js

          echo "Checking that catalog contains temporal layers:"
          grep -q "finland-vap-coniferous-2001-2018" build/generateddocs/data/catalog.json
          grep -q "finland-vap-deciduous-2001-2018" build/generateddocs/data/catalog.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/generateddocs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
