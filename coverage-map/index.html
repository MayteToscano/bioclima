<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EBV CoverageJSON Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .panel {
      position: absolute;
      z-index: 1000;
      top: 12px;
      left: 12px;
      max-width: 370px;
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      line-height: 1.35;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 17px;
    }
    .panel p {
      margin: 6px 0;
      font-size: 13px;
    }
    .panel code {
      background: #eef2f3;
      padding: 1px 4px;
      border-radius: 4px;
    }
    .legend {
      margin-top: 10px;
    }
    .bar {
      height: 14px;
      border-radius: 8px;
      background: linear-gradient(to right, #2c7bb6, #abd9e9, #ffffbf, #fdae61, #d7191c);
      border: 1px solid #ccc;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-top: 2px;
    }
    .lang {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #ccd1d1;
      background: white;
      border-radius: 999px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    button.active {
      border-color: #1f618d;
      color: #1f618d;
      font-weight: 700;
    }
    .leaflet-image-layer {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <h1 data-i18n="title">EBV CoverageJSON Map</h1>
  <p data-i18n="intro">CoverageJSON Grid crop rendered as a raster layer. Click the raster to inspect the VAP day-of-year value.</p>
  <p><strong data-i18n="entityLabel">Entity:</strong> <span id="entity">ConiferousForest</span></p>
  <p><strong data-i18n="yearLabel">Year:</strong> <span id="year">2001</span></p>
  <p><strong data-i18n="parameterLabel">Parameter:</strong> <a href="../vocab/#vap_doy" target="_blank">vap_doy</a></p>
  <div class="legend">
    <div class="bar"></div>
    <div class="legend-labels"><span id="minLabel">min</span><span id="maxLabel">max</span></div>
  </div>
  <div class="lang">
    <button data-lang="en">English</button>
    <button data-lang="es">Español</button>
    <button data-lang="ro">Română</button>
    <button data-lang="zh">中文</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const I18N = {
  en: {
    title: "EBV CoverageJSON Map",
    intro: "CoverageJSON Grid crop rendered as a raster layer. Click the raster to inspect the VAP day-of-year value.",
    entityLabel: "Entity:",
    yearLabel: "Year:",
    parameterLabel: "Parameter:",
    popupTitle: "Raster cell",
    vap: "Start of VAP",
    doy: "day of year",
    row: "Row",
    col: "Column",
    noData: "No data"
  },
  es: {
    title: "Mapa EBV CoverageJSON",
    intro: "Recorte CoverageJSON Grid representado como capa raster. Haz clic en el raster para consultar el valor VAP como día del año.",
    entityLabel: "Entidad:",
    yearLabel: "Año:",
    parameterLabel: "Parámetro:",
    popupTitle: "Celda raster",
    vap: "Inicio del VAP",
    doy: "día del año",
    row: "Fila",
    col: "Columna",
    noData: "Sin datos"
  },
  ro: {
    title: "Hartă EBV CoverageJSON",
    intro: "Decupaj CoverageJSON Grid redat ca strat raster. Fă clic pe raster pentru a inspecta valoarea VAP ca zi a anului.",
    entityLabel: "Entitate:",
    yearLabel: "An:",
    parameterLabel: "Parametru:",
    popupTitle: "Celulă raster",
    vap: "Începutul PAV",
    doy: "ziua anului",
    row: "Rând",
    col: "Coloană",
    noData: "Fără date"
  },
  zh: {
    title: "EBV CoverageJSON 地图",
    intro: "将 CoverageJSON Grid 裁剪区域渲染为栅格图层。点击栅格可查看 VAP 年积日数值。",
    entityLabel: "实体：",
    yearLabel: "年份：",
    parameterLabel: "参数：",
    popupTitle: "栅格单元",
    vap: "VAP 开始",
    doy: "年积日",
    row: "行",
    col: "列",
    noData: "无数据"
  }
};

function normaliseLang(lang) {
  lang = (lang || "en").toLowerCase();
  if (lang.startsWith("es")) return "es";
  if (lang.startsWith("ro")) return "ro";
  if (lang.startsWith("zh")) return "zh";
  return "en";
}

let currentLang = normaliseLang(localStorage.getItem("coverage_map_lang") || navigator.language);

function applyLang(lang) {
  currentLang = normaliseLang(lang);
  localStorage.setItem("coverage_map_lang", currentLang);
  document.documentElement.lang = currentLang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = I18N[currentLang][el.dataset.i18n] || I18N.en[el.dataset.i18n];
  });
  document.querySelectorAll("button[data-lang]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
}

document.querySelectorAll("button[data-lang]").forEach(btn => {
  btn.addEventListener("click", () => applyLang(btn.dataset.lang));
});

applyLang(currentLang);

const map = L.map("map", {
  preferCanvas: true
});

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

function colorForValue(value, min, max) {
  if (value === null || value === undefined || Number.isNaN(value)) {
    return [0, 0, 0, 0];
  }
  const t = Math.max(0, Math.min(1, (value - min) / (max - min || 1)));
  // 5-stop palette: blue -> light blue -> yellow -> orange -> red
  const stops = [
    [44, 123, 182],
    [171, 217, 233],
    [255, 255, 191],
    [253, 174, 97],
    [215, 25, 28]
  ];
  const scaled = t * (stops.length - 1);
  const i = Math.min(stops.length - 2, Math.floor(scaled));
  const f = scaled - i;
  const a = stops[i];
  const b = stops[i + 1];
  return [
    Math.round(a[0] + (b[0] - a[0]) * f),
    Math.round(a[1] + (b[1] - a[1]) * f),
    Math.round(a[2] + (b[2] - a[2]) * f),
    210
  ];
}

function getAxisValues(cov, axisName) {
  const axis = cov.domain.axes[axisName];
  if (axis.values) return axis.values;
  if (axis.start !== undefined && axis.stop !== undefined && axis.num !== undefined) {
    const values = [];
    const step = (axis.stop - axis.start) / (axis.num - 1);
    for (let i = 0; i < axis.num; i++) values.push(axis.start + step * i);
    return values;
  }
  throw new Error("Unsupported axis encoding for " + axisName);
}

function computeCellStep(values) {
  if (values.length < 2) return 0.05;
  let diffs = [];
  for (let i = 1; i < values.length; i++) {
    diffs.push(Math.abs(values[i] - values[i - 1]));
  }
  diffs.sort((a, b) => a - b);
  return diffs[Math.floor(diffs.length / 2)];
}

function nearestIndex(values, value) {
  let best = 0;
  let bestDist = Infinity;
  for (let i = 0; i < values.length; i++) {
    const d = Math.abs(values[i] - value);
    if (d < bestDist) {
      best = i;
      bestDist = d;
    }
  }
  return best;
}

fetch("data/finland-vap-coniferous-2001-crop.covjson")
  .then(resp => {
    if (!resp.ok) throw new Error("Could not load CoverageJSON: " + resp.status);
    return resp.json();
  })
  .then(cov => {
    const xs = getAxisValues(cov, "x");
    const ys = getAxisValues(cov, "y");
    const range = cov.ranges.vap_doy;
    const values = range.values;
    const width = range.shape[1];
    const height = range.shape[0];

    const validValues = values.filter(v => v !== null && v !== undefined && !Number.isNaN(v));
    const min = Math.min(...validValues);
    const max = Math.max(...validValues);

    document.getElementById("minLabel").textContent = String(min);
    document.getElementById("maxLabel").textContent = String(max);

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    const image = ctx.createImageData(width, height);

    for (let i = 0; i < values.length; i++) {
      const rgba = colorForValue(values[i], min, max);
      image.data[i * 4 + 0] = rgba[0];
      image.data[i * 4 + 1] = rgba[1];
      image.data[i * 4 + 2] = rgba[2];
      image.data[i * 4 + 3] = rgba[3];
    }
    ctx.putImageData(image, 0, 0);

    const dx = computeCellStep(xs);
    const dy = computeCellStep(ys);

    const west = Math.min(...xs) - dx / 2;
    const east = Math.max(...xs) + dx / 2;
    const south = Math.min(...ys) - dy / 2;
    const north = Math.max(...ys) + dy / 2;

    const bounds = [[south, west], [north, east]];
    const overlay = L.imageOverlay(canvas.toDataURL("image/png"), bounds, {
      opacity: 0.82,
      interactive: true
    }).addTo(map);

    map.fitBounds(bounds);

    overlay.on("click", ev => {
      const lon = ev.latlng.lng;
      const lat = ev.latlng.lat;
      const col = nearestIndex(xs, lon);
      const row = nearestIndex(ys, lat);
      const value = values[row * width + col];
      const t = I18N[currentLang];
      const content = value === null || value === undefined
        ? `<strong>${t.popupTitle}</strong><br>${t.noData}<br>${t.row}: ${row}<br>${t.col}: ${col}`
        : `<strong>${t.popupTitle}</strong><br>${t.vap}: <strong>${value}</strong> ${t.doy}<br>${t.row}: ${row}<br>${t.col}: ${col}<br><a href="../vocab/#vap_doy" target="_blank">vap_doy</a>`;
      L.popup()
        .setLatLng(ev.latlng)
        .setContent(content)
        .openOn(map);
    });
  })
  .catch(err => {
    console.error(err);
    alert(err.message);
  });
</script>
</body>
</html>
